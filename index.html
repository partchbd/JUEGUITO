<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡El Juego de la Viborita para el Lugue!</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 1.8rem;
            color: #4ecca3;
            text-shadow: 0 0 10px rgba(78, 204, 163, 0.3);
        }

        #score-board {
            font-size: 1.2rem;
            margin-bottom: 15px;
            font-weight: bold;
        }

        #game-container {
            position: relative;
            background: #161623;
            border: 4px solid #4ecca3;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        canvas {
            display: block;
        }

        #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(22, 22, 35, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        #game-over-screen.active {
            opacity: 1;
            pointer-events: auto;
        }

        #game-over-screen h2 {
            color: #ff4a5a;
            font-size: 2rem;
            margin-bottom: 15px;
        }

        button {
            background: #4ecca3;
            color: #1a1a2e;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }

        button:hover {
            background: #3db892;
            transform: scale(1.05);
        }

        /* Controles para Celular */
        #controls {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 10px;
            margin-top: 20px;
        }

        .btn-dir {
            background: #232946;
            color: #b8c1ec;
            border: 2px solid #4ecca3;
            border-radius: 50%;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
        }

        .btn-dir:active {
            background: #4ecca3;
            color: #1a1a2e;
        }

        #up { grid-column: 2; grid-row: 1; }
        #left { grid-column: 1; grid-row: 2; }
        #right { grid-column: 3; grid-row: 2; }
        #down { grid-column: 2; grid-row: 3; }

        /* Ocultar controles en PC si tiene teclado, pero dejarlos visibles para pantallas táctiles */
        @media (pointer: fine) {
            #controls {
                display: none; /* Se oculta si se detecta un mouse */
            }
        }
    </style>
</head>
<body>

    <h1>SNAKE - LUGUE EDITION</h1>
    <div id="score-board">Puntos: <span id="score">0</span> | Máximo: <span id="high-score">0</span></div>

    <div id="game-container">
        <canvas id="gameCanvas" width="340" height="340"></canvas>
        <div id="game-over-screen" id="gameOverScreen">
            <h2>¡Perdiste!</h2>
            <button onclick="resetGame()">Jugar de Nuevo</button>
        </div>
    </div>

    <!-- Controles en pantalla para móviles -->
    <div id="controls">
        <div class="btn-dir" id="up">▲</div>
        <div class="btn-dir" id="left">◀</div>
        <div class="btn-dir" id="right">▶</div>
        <div class="btn-dir" id="down">▼</div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const highScoreElement = document.getElementById("high-score");
        const gameOverScreen = document.getElementById("game-over-screen");

        // Configuración del tablero
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        // Estado del juego
        let snake = [{x: 8, y: 8}];
        let food = {x: 5, y: 5};
        let dx = 1; // Dirección inicial en X (derecha)
        let dy = 0; // Dirección inicial en Y
        let score = 0;
        let highScore = localStorage.getItem("snakeHighScore") || 0;
        let gameInterval;
        let gameSpeed = 120; // Milisegundos por frame (más bajo = más rápido)
        let changingDirection = false; // Evita que se suicide al presionar dos teclas rápido

        highScoreElement.textContent = highScore;

        // Iniciar bucle principal
        function startGame() {
            gameInterval = setInterval(main, gameSpeed);
        }

        function main() {
            if (hasGameEnded()) {
                gameOverScreen.classList.add("active");
                clearInterval(gameInterval);
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem("snakeHighScore", highScore);
                    highScoreElement.textContent = highScore;
                }
                return;
            }

            changingDirection = false;
            clearCanvas();
            drawFood();
            moveSnake();
            drawSnake();
        }

        // Limpiar el tablero
        function clearCanvas() {
            ctx.fillStyle = "#161623";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // Dibujar la viborita
        function drawSnake() {
            snake.forEach((part, index) => {
                // La cabeza es de un color un poco más claro
                ctx.fillStyle = index === 0 ? "#64ffda" : "#4ecca3";
                ctx.strokeStyle = "#161623";
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize, gridSize);
                ctx.strokeRect(part.x * gridSize, part.y * gridSize, gridSize, gridSize);
            });
        }

        // Mover la viborita
        function moveSnake() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);

            // Verificar si comió la manzana
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.textContent = score;
                generateFood();
            } else {
                snake.pop(); // Si no comió, saca la cola para mantener el tamaño
            }
        }

        // Generar comida en un lugar aleatorio
        function generateFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);

            // Asegurar que la comida no aparezca encima de la serpiente
            snake.forEach(part => {
                if (part.x === food.x && part.y === food.y) {
                    generateFood();
                }
            });
        }

        // Dibujar comida
        function drawFood() {
            ctx.fillStyle = "#ff4a5a";
            ctx.beginPath();
            ctx.arc((food.x * gridSize) + gridSize/2, (food.y * gridSize) + gridSize/2, gridSize/2 - 2, 0, Math.PI * 2);
            ctx.fill();
        }

        // Detectar colisiones
        function hasGameEnded() {
            // Colisión con paredes
            if (snake[0].x < 0 || snake[0].x >= tileCount || snake[0].y < 0 || snake[0].y >= tileCount) {
                return true;
            }
            // Colisión consigo misma
            for (let i = 1; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }
            return false;
        }

        // Cambiar dirección lógica
        function changeDirection(newDx, newDy) {
            if (changingDirection) return;
            
            // Evitar que gire 180 grados directamente sobre sí misma
            const goingUp = dy === -1;
            const goingDown = dy === 1;
            const goingRight = dx === 1;
            const goingLeft = dx === -1;

            if (newDx === 1 && !goingLeft) { dx = 1; dy = 0; changingDirection = true; }
            if (newDx === -1 && !goingRight) { dx = -1; dy = 0; changingDirection = true; }
            if (newDy === 1 && !goingUp) { dx = 0; dy = 1; changingDirection = true; }
            if (newDy === -1 && !goingDown) { dx = 0; dy = -1; changingDirection = true; }
        }

        // Escuchar Teclado (PC)
        document.addEventListener("keydown", event => {
            if (event.key === "ArrowUp" || event.key === "w") changeDirection(0, -1);
            if (event.key === "ArrowDown" || event.key === "s") changeDirection(0, 1);
            if (event.key === "ArrowLeft" || event.key === "a") changeDirection(-1, 0);
            if (event.key === "ArrowRight" || event.key === "d") changeDirection(1, 0);
        });

        // Escuchar Botones en Pantalla (Móvil)
        document.getElementById("up").addEventListener("touchstart", () => changeDirection(0, -1));
        document.getElementById("down").addEventListener("touchstart", () => changeDirection(0, 1));
        document.getElementById("left").addEventListener("touchstart", () => changeDirection(-1, 0));
        document.getElementById("right").addEventListener("touchstart", () => changeDirection(1, 0));
        
        // Soporte para clics en vez de touch (por si acaso en PC prueban los botones)
        document.getElementById("up").addEventListener("click", () => changeDirection(0, -1));
        document.getElementById("down").addEventListener("click", () => changeDirection(0, 1));
        document.getElementById("left").addEventListener("click", () => changeDirection(-1, 0));
        document.getElementById("right").addEventListener("click", () => changeDirection(1, 0));

        // Reiniciar el juego
        function resetGame() {
            snake = [{x: 8, y: 8}];
            generateFood();
            dx = 1;
            dy = 0;
            score = 0;
            scoreElement.textContent = score;
            gameOverScreen.classList.remove("active");
            clearInterval(gameInterval);
            startGame();
        }

        // Arrancar por primera vez
        generateFood();
        startGame();
    </script>
</body>
</html>
